# Platform-specific binary package for darwin-arm64.
# CI copies the built binary to nautilus/nautilus before running:
#   python -m build --wheel

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nautilus-orm-darwin-arm64"
version = "0.0.0-dev"
description = "Nautilus ORM binary for darwin-arm64"
license = { text = "MIT OR Apache-2.0" }
requires-python = ">=3.9"

[tool.hatch.build.targets.wheel]
packages = ["nautilus"]
# Include the binary even though it is not a .py file
artifacts = ["nautilus/nautilus"]
